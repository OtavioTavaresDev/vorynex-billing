<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vorynex Billing - Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="flex flex-col items-center mb-8">
        <img src="assets/vorynex.png" alt="Vorynex Logo" class="h-16 w-auto mb-4" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="w-16 h-16 bg-indigo-600 rounded-xl flex items-center justify-center mb-4 hidden">
          <svg width="40" height="40" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="60" height="60" rx="12" fill="#4F46E5"/>
            <path d="M15 30L30 15L45 30L30 45L15 30Z" fill="white"/>
            <circle cx="30" cy="30" r="8" fill="#4F46E5"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Vorynex Billing</h1>
        <p class="text-gray-500 mt-1">Demo - Acesso Limitado</p>
      </div>
      
      <div id="setupSection" class="hidden">
        <h2 class="text-lg font-semibold mb-4 text-center">Primeiro Acesso - Criar Admin</h2>
        <form id="setupForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
            <input type="text" id="setupUsername" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" id="setupPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div id="setupError" class="text-red-500 text-sm hidden"></div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition">Criar conta admin</button>
        </form>
      </div>

      <div id="loginSection">
        <form id="loginForm" class="space-y-5">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
            <input type="text" id="username" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div id="loginError" class="text-red-500 text-sm hidden"></div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition">Entrar</button>
        </form>
        <div class="mt-4 text-center">
          <button id="showCreateAccountModal" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Criar nova conta (requer senha root)</button>
        </div>
        <p class="mt-4 text-xs text-center text-gray-500">Versão demo: máx. 3 clientes, 3 transações, 3 usuários.</p>
      </div>
    </div>
  </div>

  <!-- Modal Criar Conta -->
  <div id="createAccountModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <h3 class="text-xl font-bold mb-4">Criar Nova Conta</h3>
      <form id="createAccountForm">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Nome de usuário</label>
          <input type="text" id="newUsername" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Nome na empresa</label>
          <input type="text" id="companyName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Senha</label>
          <input type="password" id="newPassword" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Senha Root (autorização)</label>
          <input type="password" id="rootPassword" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div id="createAccountError" class="text-red-500 text-sm mb-3 hidden"></div>
        <div class="flex justify-end space-x-2">
          <button type="button" id="closeCreateAccountModal" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancelar</button>
          <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const createModal = document.getElementById('createAccountModal');
    const showBtn = document.getElementById('showCreateAccountModal');
    const closeBtn = document.getElementById('closeCreateAccountModal');
    
    showBtn.addEventListener('click', () => {
      createModal.classList.remove('hidden');
      createModal.classList.add('flex');
    });
    closeBtn.addEventListener('click', () => {
      createModal.classList.add('hidden');
      createModal.classList.remove('flex');
    });
    createModal.addEventListener('click', (e) => {
      if (e.target === createModal) {
        createModal.classList.add('hidden');
        createModal.classList.remove('flex');
      }
    });

    document.getElementById('createAccountForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('newUsername').value;
      const companyName = document.getElementById('companyName').value;
      const password = document.getElementById('newPassword').value;
      const rootPassword = document.getElementById('rootPassword').value;
      const errorDiv = document.getElementById('createAccountError');
      
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, companyName, password, rootPassword })
      });
      const data = await res.json();
      if (res.ok) {
        alert('Conta criada com sucesso! Você já pode fazer login.');
        createModal.classList.add('hidden');
        createModal.classList.remove('flex');
        document.getElementById('createAccountForm').reset();
      } else {
        errorDiv.textContent = data.error || 'Erro ao criar conta';
        errorDiv.classList.remove('hidden');
      }
    });

    // Lógica de primeiro acesso e login (mantida)
    async function checkFirstAccess() {
      try {
        const res = await fetch('/api/first-access');
        const data = await res.json();
        if (data.firstAccess) {
          document.getElementById('setupSection').classList.remove('hidden');
          document.getElementById('loginSection').classList.add('hidden');
        } else {
          document.getElementById('setupSection').classList.add('hidden');
          document.getElementById('loginSection').classList.remove('hidden');
        }
      } catch (e) {
        console.error(e);
      }
    }
    checkFirstAccess();

    document.getElementById('setupForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('setupUsername').value;
      const password = document.getElementById('setupPassword').value;
      const errorDiv = document.getElementById('setupError');
      
      const res = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      if (res.ok) {
        window.location.reload();
      } else {
        const data = await res.json();
        errorDiv.textContent = data.error || 'Erro ao criar admin';
        errorDiv.classList.remove('hidden');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error || 'Erro ao fazer login';
          errorDiv.classList.remove('hidden');
          return;
        }
        
        localStorage.setItem('vorynex_user', JSON.stringify({
          username: data.username,
          role: data.role
        }));
        
        window.location.href = '/dashboard.html';
      } catch (error) {
        errorDiv.textContent = 'Erro de conexão.';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
